services:
  euphoric-tickets:
    image: ${BOT_IMAGE:-ghcr.io/jason-tucker/euphoric-tickets:latest}
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://tickets:${POSTGRES_PASSWORD:-tickets_dev}@db:5432/tickets"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tickets
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tickets_dev}
      POSTGRES_DB: tickets
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
