services:
  euphoric-tickets:
    image: ${BOT_IMAGE:-ghcr.io/jason-tucker/euphoric-tickets:latest}
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Shared Postgres on efm-public-net — the web (euphoric-tickets-web)
      # owns the schema and runs drizzle-kit push. POSTGRES_PASSWORD must
      # match what the web stack uses (`.env` of both is the same).
      DATABASE_URL: "postgresql://tickets_web:${POSTGRES_PASSWORD:-tickets_web_dev}@tickets-db:5432/tickets_web"
      NODE_ENV: production
    networks:
      - efm-public-net
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # Web's db container exposes itself here as `tickets-db`. Created by
  # the web stack; declare external here so we just join it.
  efm-public-net:
    external: true
