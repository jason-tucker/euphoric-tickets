name: Deploy Euphoric Tickets

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-euphoric-tickets
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy slash commands against Discord. EUPHORIC API not used here;
      # GUILD_ID and Discord credentials must be set as repo secrets.
      - name: Deploy slash commands
        continue-on-error: true
        run: |
          docker run --rm --entrypoint="" \
            -e DISCORD_BOT_TOKEN="${{ secrets.DISCORD_BOT_TOKEN }}" \
            -e DISCORD_CLIENT_ID="${{ secrets.DISCORD_CLIENT_ID }}" \
            -e GUILD_ID="${{ secrets.GUILD_ID }}" \
            -e DATABASE_URL="postgresql://placeholder/placeholder" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            node dist/bot/registerCommands.js

      # Watchtower will auto-pull on its own poll cycle; this step makes the
      # restart immediate by triggering an explicit pull + up on the VPS.
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -Eeuo pipefail
            cd ${{ secrets.PROJECT_DIR }}

            git fetch --all
            git reset --hard origin/main

            BOT_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
              docker compose pull euphoric-tickets

            BOT_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
              docker compose up -d --remove-orphans

            sleep 10
            if ! docker compose ps euphoric-tickets | grep -q "running\|Up"; then
              echo "ERROR: euphoric-tickets container is not running"
              docker compose logs euphoric-tickets --tail=30
              exit 1
            fi

            echo "✓ euphoric-tickets is running."
            docker compose ps euphoric-tickets

      - name: Notify success
        if: success()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "DISCORD_DEPLOY_WEBHOOK not set — skipping notification"; exit 0; fi
          SHORT_SHA="${GITHUB_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          curl -s -o /dev/null -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Euphoric Tickets deployed\",
                \"description\": \"[\`${SHORT_SHA}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) ${COMMIT_MSG}\",
                \"color\": 5763719,
                \"footer\": { \"text\": \"Triggered by ${GITHUB_ACTOR}\" }
              }]
            }"

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "DISCORD_DEPLOY_WEBHOOK not set — skipping notification"; exit 0; fi
          SHORT_SHA="${GITHUB_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          curl -s -o /dev/null -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Euphoric Tickets deploy FAILED\",
                \"description\": \"[\`${SHORT_SHA}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) ${COMMIT_MSG}\",
                \"color\": 15548997,
                \"footer\": { \"text\": \"Triggered by ${GITHUB_ACTOR} — check Actions logs\" }
              }]
            }"
